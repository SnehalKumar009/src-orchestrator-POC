services:
  # ── PostgreSQL (Database) ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: src-postgres
    environment:
      POSTGRES_DB: src_orchestrator
      POSTGRES_USER: srcadmin
      POSTGRES_PASSWORD: srcpass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U srcadmin -d src_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector DB for RAG) ───────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: src-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Application ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: src-orchestrator-app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: src_orchestrator
      POSTGRES_USER: srcadmin
      POSTGRES_PASSWORD: srcpass123
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  pgdata:
  qdrantdata:
